<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virgil Cantin — Portfolio</title>
    <link rel="stylesheet" href="photographie.css" />
     <script src="photographie.js"></script>
</head>
<body>

<body>

<header>
  <div class="login"><span class="dot">●</span> Connexion</div>
  <div class="brand">Nom Prénom</div>
  <nav id="filters">
    <button class="active" data-filter="tout">Tout</button>
    <button data-filter="portrait">Portrait</button>
    <button data-filter="paysage">Paysage</button>
    <button data-filter="rue">Rue</button>
    <button data-filter="animaux">Animaux</button>
    <button data-filter="coree">Corée du Sud</button>
    <span class="sep"></span>
    <a class="about" href="#">À Propos</a>
  </nav>
</header>

<section class="grid" id="grid">

  <figure data-cat="portrait"><img src="https://picsum.photos/seed/portrait-a/700/875" alt="Portrait"><figcaption>Portrait — 01</figcaption></figure>
  <figure data-cat="paysage"><img src="https://picsum.photos/seed/paysage-a/700/875" alt="Paysage"><figcaption>Paysage — 01</figcaption></figure>
  <figure data-cat="rue"><img src="https://picsum.photos/seed/rue-a/700/875" alt="Rue"><figcaption>Rue — 01</figcaption></figure>

  <figure data-cat="animaux"><img src="https://picsum.photos/seed/animaux-a/700/875" alt="Animaux"><figcaption>Animaux — 01</figcaption></figure>
  <figure data-cat="coree"><img src="https://picsum.photos/seed/coree-a/700/875" alt="Corée du Sud"><figcaption>Corée du Sud — 01</figcaption></figure>
  <figure data-cat="portrait"><img src="https://picsum.photos/seed/portrait-b/700/875" alt="Portrait"><figcaption>Portrait — 02</figcaption></figure>

  <figure data-cat="paysage"><img src="https://picsum.photos/seed/paysage-b/700/875" alt="Paysage"><figcaption>Paysage — 02</figcaption></figure>
  <figure data-cat="rue"><img src="https://picsum.photos/seed/rue-b/700/875" alt="Rue"><figcaption>Rue — 02</figcaption></figure>
  <figure data-cat="animaux"><img src="https://picsum.photos/seed/animaux-b/700/875" alt="Animaux"><figcaption>Animaux — 02</figcaption></figure>

  <figure data-cat="coree"><img src="https://picsum.photos/seed/coree-b/700/875" alt="Corée du Sud"><figcaption>Corée du Sud — 02</figcaption></figure>
  <figure data-cat="portrait"><img src="https://picsum.photos/seed/portrait-c/700/875" alt="Portrait"><figcaption>Portrait — 03</figcaption></figure>
  <figure data-cat="paysage"><img src="https://picsum.photos/seed/paysage-c/700/875" alt="Paysage"><figcaption>Paysage — 03</figcaption></figure>

</section>

<footer>© Nom Prénom — Tous droits réservés</footer>

<script>
  const buttons = document.querySelectorAll('#filters button');
  const items = document.querySelectorAll('#grid figure');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      items.forEach(item => {
        if(f === 'tout' || item.dataset.cat === f){
          item.classList.remove('hide');
        } else {
          item.classList.add('hide');
        }
      });
    });
  });
</script>

</body>
</html>
