<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nom Prénom — Photographe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1a18;
    --paper:#ffffff;
    --muted:#8a8580;
    --line:#e7e3df;
    --accent:#b07d52;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header{
    padding:34px 32px 0;
    position:relative;
  }

  .top-nav{
    text-align:center;
    font-family:'Fraunces', serif;
    font-weight:400;
    font-size:1.6rem;
    letter-spacing:0.5px;
    color:var(--ink);
  }

  .login{
    position:absolute;
    top:30px;
    right:32px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.8rem;
    letter-spacing:0.5px;
    color:var(--muted);
  }
  .login span.dot{
    width:22px;height:22px;border-radius:50%;
    border:1px solid var(--muted);
    display:flex;align-items:center;justify-content:center;
    font-size:0.7rem;
  }

  nav{
    margin-top:30px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:34px;
    padding-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  nav button{
    background:none;
    border:none;
    font-family:'Jost', sans-serif;
    font-size:0.78rem;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:var(--muted);
    cursor:pointer;
    padding:4px 0;
    position:relative;
    transition:color .25s ease;
  }
  nav button::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-7px;
    height:1px;
    background:var(--accent);
    transform:scaleX(0);
    transition:transform .25s ease;
  }
  nav button:hover{ color:var(--ink); }
  nav button.active{ color:var(--ink); }
  nav button.active::after{ transform:scaleX(1); }
  nav .sep{
    width:1px;
    background:var(--line);
    align-self:stretch;
  }
  nav a.about{
    font-size:0.78rem;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:var(--muted);
    text-decoration:none;
    padding:4px 0;
    transition:color .25s ease;
  }
  nav a.about:hover{ color:var(--ink); }

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
  }
  @media (max-width:780px){
    .grid{ grid-template-columns:repeat(2, 1fr); }
  }
  @media (max-width:480px){
    .grid{ grid-template-columns:1fr; }
  }

  figure{
    position:relative;
    margin:0;
    overflow:hidden;
    aspect-ratio:4/5;
    cursor:pointer;
  }
  figure img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .7s ease;
  }
  figure:hover img{ transform:scale(1.06); }

  figure figcaption{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:18px 20px;
    background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
    color:#fff;
    font-family:'Fraunces', serif;
    font-size:0.95rem;
    letter-spacing:0.5px;
    opacity:0;
    transform:translateY(8px);
    transition:opacity .35s ease, transform .35s ease;
  }
  figure:hover figcaption{ opacity:1; transform:translateY(0); }

  figure.hide{
    display:none;
  }

  footer{
    text-align:center;
    padding:36px 0;
    font-size:0.72rem;
    letter-spacing:1px;
    color:var(--muted);
    text-transform:uppercase;
  }

  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(15,13,12,.94);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    visibility:hidden;
    transition:opacity .3s ease;
    z-index:1000;
  }
  .lightbox.open{
    opacity:1;
    visibility:visible;
  }
  .lightbox img{
    max-width:88vw;
    max-height:84vh;
    object-fit:contain;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    transform:scale(.96);
    transition:transform .3s ease;
  }
  .lightbox.open img{ transform:scale(1); }

  .lightbox figcaption{
    position:absolute;
    left:0; right:0; bottom:36px;
    text-align:center;
    color:#f1eee9;
    font-family:'Fraunces', serif;
    font-size:0.95rem;
    letter-spacing:0.5px;
  }

  .lightbox .close{
    position:absolute;
    top:28px;
    right:32px;
    width:38px;
    height:38px;
    border:1px solid rgba(255,255,255,.35);
    border-radius:50%;
    background:none;
    color:#f1eee9;
    font-size:1.1rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .2s ease, border-color .2s ease;
  }
  .lightbox .close:hover{
    background:rgba(255,255,255,.08);
    border-color:rgba(255,255,255,.6);
  }

  .lightbox .nav-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:#f1eee9;
    font-size:1.8rem;
    cursor:pointer;
    padding:12px 16px;
    opacity:.7;
    transition:opacity .2s ease;
  }
  .lightbox .nav-arrow:hover{ opacity:1; }
  .lightbox .prev{ left:8px; }
  .lightbox .next{ right:8px; }

  @media (max-width:600px){
    .lightbox .nav-arrow{ font-size:1.4rem; padding:8px 10px; }
    .lightbox .close{ top:16px; right:16px; }
  }
</style>
</head>
<body>

<header>
      <div class="topbar">
    <nav class="top-nav">
      <a href="index.html">Accueil</a>
      <a href="profil.html">Profil</a>
      <a href="photographie.html">Photographie</a>
      <a href="webdesing.html">Webdesign</a>
      <a href="projetsco.html">Projet scolaire</a>
    </nav>

  <nav id="filters">
    <button class="active" data-filter="tout">Tout</button>
    <button data-filter="portrait">Portrait</button>
    <button data-filter="paysage">Paysage</button>
    <button data-filter="rue">Rue</button>
    <button data-filter="animaux">Animaux</button>
  </nav>
</header>

<section class="grid" id="grid">

 <figure data-cat="portrait"><img src="Photo/Mamie resto.jpg." alt="Portrait"><figcaption>Portrait d'une grand-mère coréenne</figcaption></figure>
  <figure data-cat="portrait"><img src="Photo/Mamie 1.jpg" alt="Portrait"><figcaption>Grand-mère coréenne au travail</figcaption></figure>
  <figure data-cat="portrait"><img src="Photo/Spidy pêcheur1.jpg" alt="Portrait"><figcaption>Portrait d'un pêcheur coréen 1</figcaption></figure>
  <figure data-cat="portrait"><img src="Photo/Spidy pêcheur2.jpg" alt="Portrait"><figcaption>Portrait d'un pêcheur coréen 2</figcaption></figure>
  <figure data-cat="portrait"><img src="Photo/Spidy pêcheur3.jpg" alt="Portrait"><figcaption>Portrait d'un pêcheur coréen 3</figcaption></figure>
  <figure data-cat="portrait"><img src="Photo/Papi resto.jpg" alt="Portrait"><figcaption>Portrait d'un grand père coréen</figcaption></figure>

  <figure data-cat="paysage"><img src="https://picsum.photos/seed/paysage-b/700/875" alt="Paysage"><figcaption>Paysage — 02</figcaption></figure>
  <figure data-cat="rue"><img src="https://picsum.photos/seed/rue-b/700/875" alt="Rue"><figcaption>Rue — 02</figcaption></figure>
  <figure data-cat="animaux"><img src="https://picsum.photos/seed/animaux-b/700/875" alt="Animaux"><figcaption>Animaux — 02</figcaption></figure>

  <figure data-cat="rue"><img src="https://picsum.photos/seed/rue-b/700/875" alt="Corée du Sud"><figcaption>Corée du Sud — 02</figcaption></figure>
  <figure data-cat="portrait"><img src="https://picsum.photos/seed/portrait-c/700/875" alt="Portrait"><figcaption>Portrait — 03</figcaption></figure>
  <figure data-cat="paysage"><img src="https://picsum.photos/seed/paysage-c/700/875" alt="Paysage"><figcaption>Paysage — 03</figcaption></figure>

</section>

<div class="lightbox" id="lightbox">
  <button class="close" id="lightboxClose" aria-label="Fermer">✕</button>
  <button class="nav-arrow prev" id="lightboxPrev" aria-label="Image précédente">‹</button>
  <img id="lightboxImg" src="" alt="">
  <figcaption id="lightboxCaption"></figcaption>
  <button class="nav-arrow next" id="lightboxNext" aria-label="Image suivante">›</button>
</div>

<footer>© Nom Prénom — Tous droits réservés</footer>

<script>
  const buttons = document.querySelectorAll('#filters button');
  const items = document.querySelectorAll('#grid figure');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      items.forEach(item => {
        if(f === 'tout' || item.dataset.cat === f){
          item.classList.remove('hide');
        } else {
          item.classList.add('hide');
        }
      });
    });
  });

  // Visionneuse plein écran
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxCaption = document.getElementById('lightboxCaption');
  const closeBtn = document.getElementById('lightboxClose');
  const prevBtn = document.getElementById('lightboxPrev');
  const nextBtn = document.getElementById('lightboxNext');
  let currentIndex = 0;

  function visibleItems(){
    return Array.from(items).filter(item => !item.classList.contains('hide'));
  }

  function openLightbox(index){
    const visible = visibleItems();
    if(!visible.length) return;
    currentIndex = (index + visible.length) % visible.length;
    const item = visible[currentIndex];
    const img = item.querySelector('img');
    const caption = item.querySelector('figcaption');
    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt;
    lightboxCaption.textContent = caption ? caption.textContent : '';
    lightbox.classList.add('open');
  }

  function closeLightbox(){
    lightbox.classList.remove('open');
  }

  items.forEach((item) => {
    item.addEventListener('click', () => {
      const visible = visibleItems();
      const index = visible.indexOf(item);
      openLightbox(index);
    });
  });

  closeBtn.addEventListener('click', closeLightbox);
  prevBtn.addEventListener('click', (e) => { e.stopPropagation(); openLightbox(currentIndex - 1); });
  nextBtn.addEventListener('click', (e) => { e.stopPropagation(); openLightbox(currentIndex + 1); });

  lightbox.addEventListener('click', (e) => {
    if(e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if(!lightbox.classList.contains('open')) return;
    if(e.key === 'Escape') closeLightbox();
    if(e.key === 'ArrowRight') openLightbox(currentIndex + 1);
    if(e.key === 'ArrowLeft') openLightbox(currentIndex - 1);
  });
</script>

</body>
</html>
